<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<main class="auth-shell">
  <section class="auth-panel brand-panel">
    <p class="eyebrow">Digital Habit Tracker</p>
    <h1>Plan the habit, track the day.</h1>
    <div class="preview-board" aria-hidden="true">
      <div class="preview-row complete">
        <span>Morning walk</span>
        <strong>06:30</strong>
      </div>
      <div class="preview-row">
        <span>Read 20 pages</span>
        <strong>21:00</strong>
      </div>
      <div class="preview-row muted">
        <span>Weekly progress</span>
        <strong>5/7</strong>
      </div>
    </div>
  </section>

  <section class="auth-panel form-panel">
    <div class="auth-tabs" role="tablist" aria-label="Authentication">
      <button class="auth-tab active" id="loginTab" type="button">Login</button>
      <button class="auth-tab" id="signupTab" type="button">Sign up</button>
    </div>

    <form id="loginForm" class="auth-form">
      <h2>Login</h2>
      <label for="loginIdentifier">Email or username</label>
      <input type="text" id="loginIdentifier" autocomplete="username" required>

      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" autocomplete="current-password" required>

      <button type="submit">Login</button>
    </form>

    <form id="signupForm" class="auth-form hidden">
      <h2>Create account</h2>
      <label for="signupUsername">Username</label>
      <input type="text" id="signupUsername" autocomplete="username" minlength="3" maxlength="30" required>

      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" autocomplete="email" required>

      <label for="signupPassword">Password</label>
      <input type="password" id="signupPassword" autocomplete="new-password" minlength="8" required>

      <label for="signupConfirmPassword">Confirm password</label>
      <input type="password" id="signupConfirmPassword" autocomplete="new-password" minlength="8" required>

      <button type="submit">Create account</button>
    </form>

    <p id="authStatus" class="status"></p>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
